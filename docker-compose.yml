services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-dev_hube}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-dev_hube}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      TEMP_MAIL_WORKER_URL: http://temp-mail:8100
      QR_GENERATOR_WORKER_URL: http://qr-generator:8101
      IMAGE_COMPRESSOR_WORKER_URL: http://image-compressor:8102
      PDF_TO_WORD_WORKER_URL: http://pdf-to-word:8103
      MERGE_PDF_WORKER_URL: http://merge-pdf:8104
      SPLIT_PDF_WORKER_URL: http://split-pdf:8105
      COMPRESS_PDF_WORKER_URL: http://compress-pdf:8106
      AI_ASSISTANT_WORKER_URL: http://ai-assistant:8107
      IMAGE_TO_TEXT_WORKER_URL: http://image-to-text:8108
      SPEECH_TO_TEXT_WORKER_URL: http://speech-to-text:8109
      IMAGE_CONVERTER_WORKER_URL: http://image-converter:8110
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "4000"

  web:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - api
    expose:
      - "3000"

  admin:
    build:
      context: ./Admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
    depends_on:
      - api
    ports:
      - "${ADMIN_PORT:-3001}:3001"

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

  ai-assistant:
    profiles: ["workers"]
    build:
      context: ./Services/ai-assistant
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "8107"

  temp-mail:
    profiles: ["workers"]
    build:
      context: ./Services/temp-mail
      dockerfile: ../docker/python-worker.Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8100"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8100"]
    expose:
      - "8100"

  qr-generator:
    profiles: ["workers"]
    build:
      context: ./Services/qr-generator
      dockerfile: ../docker/python-worker.Dockerfile
    restart: unless-stopped
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8101"]
    expose:
      - "8101"

  image-compressor:
